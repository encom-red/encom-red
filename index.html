<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENCOM - Transporte de Datos</title>
    <style>
        body, html { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background-color: #000; color: #fff; scroll-behavior: smooth; }
        
        .hero { 
            /* Asegúrate que el archivo en GitHub se llame exactamente edited-image.jpg */
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('edited-image.jpg') no-repeat center center; 
            background-size: cover; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
        }

        .button-group {
            margin-top: 280px; 
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .enter-button { 
            background: rgba(0, 212, 255, 0.1); 
            border: 2px solid #00d4ff; 
            color: #00d4ff; 
            padding: 15px 40px; 
            font-size: 1.1rem; 
            text-transform: uppercase; 
            cursor: pointer; 
            letter-spacing: 3px; 
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.3); 
            transition: 0.3s; 
            width: 280px;
            text-decoration: none;
            text-align: center;
            font-weight: bold;
        }

        .enter-button:hover { 
            background: #00d4ff; 
            color: #000; 
            box-shadow: 0 0 30px #00d4ff; 
        }

        .plans-container { padding: 80px 20px; display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; background: #00050a; }
        .plan-card { 
            background: rgba(0, 20, 40, 0.8); border: 1px solid #00d4ff; padding: 30px; 
            width: 280px; border-radius: 10px; text-align: center; 
        }
        
        h2.section-title { text-align: center; padding: 40px 0; background: #00050a; color: #00d4ff; margin: 0; letter-spacing: 5px; }

        footer {
            background: #000;
            color: #00d4ff;
            padding: 40px 20px;
            text-align: center;
            border-top: 2px solid #00d4ff;
            font-family: 'Courier New', Courier, monospace;
        }
    </style>
</head>
<body>

    <section class="hero">
        <div class="button-group">
            <button class="enter-button" onclick="entrarARed()">Entrar a la Red</button>
            <a href="https://wa.me/584146747145" target="_blank" class="enter-button">Contáctenos</a>
        </div>
    </section>

    <h2 class="section-title">NUESTROS SERVICIOS</h2>
    <section class="plans-container">
        <div class="plan-card"><h3>Plan Residencial</h3></div>
        <div class="plan-card"><h3>Plan Comercial</h3></div>
        <div class="plan-card"><h3>Plan Dedicado</h3></div>
    </section>

    <audio id="encomAudio">
        <source src="the-grid-audio.mp3" type="audio/mpeg">
    </audio>

    <footer>
        <div class="footer-content">
            <strong>ENCOM - TRANSPORTE DE DATOS</strong><br>
            Ciudad Ojeda • Edo. Zulia • Venezuela<br>
            encom2028@gmail.com
        </div>
    </footer>

    <script>
        function entrarARed() {
            var audio = document.getElementById("encomAudio");
            
            // Forzamos la reproducción al hacer clic
            audio.play().catch(function(error) {
                console.log("El navegador bloqueó el audio: ", error);
            });
            
            setTimeout(function() {
                window.location.href = "cobertura.html";
            }, 800); 
        }
    </script>
</body>
</html>
