<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENCOM - ISP Inalámbrico</title>
    <style>
        body, html { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background-color: #000; color: #fff; scroll-behavior: smooth; }
        
        .hero { 
            /* Usamos la imagen original de fondo */
            background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('edited-image.png'); 
            background-size: cover; 
            background-position: center; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
        }

        .enter-button { 
            background: transparent; 
            border: 2px solid #00d4ff; 
            color: #00d4ff; 
            padding: 15px 40px; 
            font-size: 1.2rem; 
            text-transform: uppercase; 
            cursor: pointer; 
            letter-spacing: 3px; 
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.5); 
            transition: 0.3s; 
            /* Mantenemos el margen que tenías para la posición */
            margin-top: 250px; 
        }

        .enter-button:hover { 
            background: #00d4ff; 
            color: #000; 
            box-shadow: 0 0 30px #00d4ff; 
        }

        .plans-container { 
            padding: 60px 20px; 
            display: flex; 
            justify-content: center; 
            gap: 30px; 
            flex-wrap: wrap; 
            background: #00050a; 
        }

        .plan-card { 
            background: rgba(0, 20, 40, 0.8); 
            border: 1px solid #00d4ff; 
            padding: 30px; 
            width: 280px; 
            border-radius: 10px; 
            text-align: center; 
            transition: 0.3s; 
        }

        .plan-card:hover { 
            transform: translateY(-10px); 
            box-shadow: 0 0 25px rgba(0, 212, 255, 0.4); 
        }

        .plan-card h3 { color: #00d4ff; text-transform: uppercase; }
        .plan-card ul { list-style: none; padding: 0; text-align: left; }
        .plan-card li { margin: 10px 0; font-size: 0.9rem; }
        .plan-card li::before { content: "▹"; color: #00d4ff; margin-right: 10px; }
        
        h2.section-title { 
            text-align: center; 
            padding: 40px 0; 
            background: #00050a; 
            color: #00d4ff; 
            margin: 0; 
            letter-spacing: 5px; 
        }
    </style>
</head>
<body>

    <section class="hero">
        <button class="enter-button" onclick="entrarARed()">Entrar a la Red</button>
    </section>

    <h2 class="section-title">NUESTROS SERVICIOS</h2>

    <section class="plans-container">
        <div class="plan-card">
            <h3>Plan Residencial</h3>
            <ul>
                <li>Navegación ilimitada</li>
                <li>Streaming y Redes</li>
                <li>Tecnología 5GHz</li>
            </ul>
        </div>
        <div class="plan-card">
            <h3>Plan Comercial</h3>
            <ul>
                <li>Prioridad de datos</li>
                <li>Balanceo de carga</li>
                <li>IP Dinámica optimizada</li>
            </ul>
        </div>
        <div class="plan-card">
            <h3>Plan Dedicado</h3>
            <ul>
                <li>Simetría completa</li>
                <li>Transporte de Datos</li>
                <li>Latencia ultra-baja (LTU)</li>
            </ul>
        </div>
    </section>

    <audio id="encomAudio" loop>
        <source src="the-grid-audio.mp3" type="audio/mpeg">
    </audio>

    <script>
        function entrarARed() {
            var audio = document.getElementById("encomAudio");
            
            // 1. Reproducir audio
            audio.play();
            
            // 2. Pequeña espera para efecto dramático y luego redirigir
            setTimeout(function() {
                window.location.href = "cobertura.html";
            }, 600); 
        }
    </script>

</body>
</html>
